    compileOnly 'javax.annotation:jsr250-api:1.0'
    // Just for Generated annotation
    implementation 'net.tribe7.seeds:seeds-collect:16.0.1'
    //implementation 'ch.boye.httpclientandroidlib:httpclient:1.1.1'

    //retrolambdaConfig 'net.orfjackal.retrolambda:retrolambda:2.5.1'
    implementation "de.devland.esperandro:esperandro-api:$esperandroVersion"
    annotationProcessor "de.devland.esperandro:esperandro-preference-gen:$esperandroVersion"
    implementation('com.crashlytics.sdk.android:crashlytics:2.10.1@aar')
    {
        transitive = true
    }
    implementation(project(':camera')) {
        exclude module: 'support-v4'
        exclude group: 'com.android.support'
    }
    implementation project(':standout')
    implementation(project(':truckdocnetwork')) {
        exclude module: 'support-v4'
        exclude group: 'com.android.support'
    }

    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'com.google.android.material:material:1.2.1'
    implementation 'com.android.support:design:28.0.0'
}
