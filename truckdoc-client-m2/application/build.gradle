plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-kapt'
    id 'dagger.hilt.android.plugin'
    id 'androidx.navigation.safeargs.kotlin'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

kotlin {
    jvmToolchain(17)
}

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

android {
    namespace "com.sanda.truckdoc.client"
    compileSdk 34
    buildToolsVersion rootProject.ext.buildToolsVersion
    flavorDimensions "default"

    defaultConfig {
        applicationId "com.sanda.truckdoc.client"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
        buildConfigField "long", "TIMESTAMP", System.currentTimeMillis() + "L"
        buildConfigField "String", "API_BASE_URL", "\"https://mobile.aps-solver.com/mobile-api/\""
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }

    lintOptions {
        abortOnError false
    }

    signingConfigs {
        truckdoc_sign_config {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile file(keystoreProperties['storeFile'])
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        debug {
            buildConfigField 'boolean', 'DEV', "Boolean.parseBoolean(\"$dev\")"
            debuggable true
            aaptOptions {
                cruncherEnabled = false
            }
        }
        release {
            debuggable false
            jniDebuggable false
            signingConfig signingConfigs.truckdoc_sign_config
            renderscriptDebuggable false
            buildConfigField 'boolean', 'DEV', "Boolean.parseBoolean(\"false\")"
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    sourceSets {
        main {
            jni.srcDirs = [] // disable automatic ndk-build call
            jniLibs.srcDirs = ['libs'] // add your jni .so file path
        }
    }

    packagingOptions {
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/ASL2.0'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/*.kotlin_module'
        exclude 'META-INF/services/javax.servlet.ServletContainerInitializer'
        exclude 'META-INF/services/javax.management.MBeanServerFactory'
        exclude 'META-INF/services/javax.naming.spi.InitialContextFactory'
        pickFirst 'META-INF/INDEX.LIST'
        pickFirst 'META-INF/io.netty.versions.properties'
    }

    productFlavors {
        defaultClient {
            applicationId 'com.sanda.truckdoc.client.default'
            dimension "default"
        }
    }

    applicationVariants.configureEach { variant ->
        variant.outputs.configureEach { output ->
            output.outputFileName = "com.sanda.truckdoc.client-${versionCode}.apk"
        }
    }
}

// Android Annotations configuration for Java 17 compatibility
// kapt {
//     arguments {
//         arg("androidannotations.logLevel", "WARN")
//         arg("androidannotations.logFile", "build/androidannotations.log")
//     }
//     javacOptions {
//         option("-source", "17")
//         option("-target", "17")
