buildscript {
    repositories {
        google()
        mavenCentral()
        jcenter()
        maven { url 'https://maven.fabric.io/public' }
        maven { url 'https://oss.sonatype.org/content/repositories/snapshots/' }
    }

    dependencies {
        classpath 'io.fabric.tools:gradle:1.31.2'
        classpath 'com.jakewharton:butterknife-gradle-plugin:10.2.3'
    }
}
repositories {
    google()
    maven { url 'https://maven.fabric.io/public' }
    maven { url "https://jitpack.io" }
    maven { url 'https://oss.sonatype.org/content/repositories/snapshots/' }
    maven { url 'https://github.com/Siu-soon/maven-repo/raw/master/releases' }
    mavenLocal()
    mavenCentral()
    jcenter()
}

apply plugin: 'com.android.application'
apply plugin: 'io.fabric'
apply plugin: 'com.jakewharton.butterknife'
//apply plugin: 'kotlin-android' //only for interoperability
//apply plugin: 'kotlin-kapt' //only for interoperability

android {
    compileSdkVersion 28
    buildToolsVersion rootProject.ext.buildToolsVersion
    flavorDimensions "default"

    defaultConfig {
        applicationId "com.sanda.truckdoc.client"
        minSdkVersion 22
        targetSdkVersion 28
        versionCode 39
        versionName "3.9"
        buildConfigField "long", "TIMESTAMP", System.currentTimeMillis() + "L"
        archivesBaseName = "com.sanda.truckdoc.client-${versionCode}"
        javaCompileOptions {
            annotationProcessorOptions {
                arguments = ['resourcePackageName': android.defaultConfig.applicationId]
                arguments = ["androidManifestFile": "$projectDir/src/main/AndroidManifest.xml".toString()]
            }
        }
    }

    lintOptions {
        abortOnError false
    }

    dexOptions {
        javaMaxHeapSize "4g"
    }


    dexOptions {
        // Prevent OutOfMemory with MultiDex during the build phase
        javaMaxHeapSize "4g"
    }


    signingConfigs {
        truckdoc_sign_config {
            keyAlias 'truckdoc-release-key'
            keyPassword 'Ugup4TIC93'
            storeFile file('C:/Truckdoc-keystore/truckdoc-keystore.jks')
            storePassword 'K9bPfqqu5I'
        }
    }

    buildTypes {
        debug {
            buildConfigField 'boolean', 'DEV', "Boolean.parseBoolean(\"$dev\")"
            ext.alwaysUpdateBuildId = false
            aaptOptions {
                cruncherEnabled = false
            }
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            debuggable false
            jniDebuggable false
            signingConfig signingConfigs.truckdoc_sign_config
            renderscriptDebuggable false
            zipAlignEnabled true
            buildConfigField 'boolean', 'DEV', "Boolean.parseBoolean(\"false\")"
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    sourceSets {
        main {
            jni.srcDirs = [] // disable automatic ndk-build call
            jniLibs.srcDirs = ['libs'] // add your jni .so file path
        }
    }
    packagingOptions {
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/ASL2.0'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/NOTICE'
    }
    productFlavors {
        defaultClient {
            applicationId 'com.sanda.truckdoc.client.default'
            dimension "default"
        }
/*        reisitaClient {
            applicationId 'com.sanda.truckdoc.client.reisita'
        }
        belkaspianClient {
            applicationId 'com.sanda.truckdoc.client.belkaspian'
        }*/
    }
}

def AAVersion = "4.7.0" // change this to your desired version, for example the latest stable: 4.6.0
dependencies {
    annotationProcessor "org.androidannotations:androidannotations:$AAVersion"
    implementation "org.androidannotations:androidannotations-api:$AAVersion"
}

dependencies {
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    implementation 'androidx.recyclerview:recyclerview:1.1.0'
    implementation "androidx.appcompat:appcompat:1.2.0"
    implementation "androidx.recyclerview:recyclerview:1.1.0"
    implementation "com.google.android.material:material:1.2.1"
    implementation "androidx.cardview:cardview:1.0.0"
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation project(':truckdoc-util')
    implementation project(':truckdoc-client-api')
    implementation project(':instructions')
    implementation project(':data')
    implementation project(':messages2')

    def commonLibs = "0.1.7"
    implementation ("com.github.naixx.common-libs:logger:$commonLibs@aar"){
        transitive = true
    }
    implementation ("com.github.naixx.common-libs:adapters:$commonLibs@aar")
    implementation ("com.github.naixx.common-libs:common:$commonLibs@aar")

 //   implementation project(':to')
/*    releaseCompile (project(path: ':checker', configuration: 'release')) {
        exclude module: 'support-v4'
        exclude group: 'com.android.support'
    }
    debugCompile(project(path: ':checker', configuration: 'debug')) {
        exclude module: 'support-v4'
        exclude group: 'com.android.support'
    }*/
    implementation group: 'org.slf4j', name: 'slf4j-api', version: '1.7.21'
    implementation group: 'org.slf4j', name: 'jcl-over-slf4j', version: '1.7.21'
    implementation group: 'ch.qos.logback', name: 'logback-classic', version: '1.1.7'
    implementation group: 'ch.qos.logback', name: 'logback-core', version: '1.1.7'
    implementation group: 'ch.qos.logback', name: 'logback-access', version: '1.1.7'
 //   compile project(':to')
    implementation project(':checker')
    implementation group: 'org.slf4j', name: 'slf4j-api', version: '1.7.21'
    implementation group: 'org.slf4j', name: 'jcl-over-slf4j', version: '1.7.21'
    implementation group: 'ch.qos.logback', name: 'logback-classic', version: '1.1.7'
    implementation group: 'ch.qos.logback', name: 'logback-core', version: '1.1.7'
    implementation group: 'ch.qos.logback', name: 'logback-access', version: '1.1.7'


    implementation 'com.fasterxml.jackson.core:jackson-databind:2.10.3'
    implementation 'org.jetbrains:annotations:19.0.0'
    //dagger 2
    implementation"org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation "com.google.dagger:dagger:$dagger"
    annotationProcessor "com.google.dagger:dagger-compiler:$dagger"

    //to enable DaggerActivity, DaggerBroadcastReceiver, DaggerFragment etc classes
    implementation "com.google.dagger:dagger-android:$dagger"
    annotationProcessor "com.google.dagger:dagger-android-processor:$dagger"
    implementation "com.google.dagger:dagger-android-support:$dagger"

    implementation group: 'androidx.annotation', name: 'annotation', version: '1.1.0'
    implementation group: 'androidx.viewpager', name: 'viewpager', version: '1.0.0'
    implementation group: 'androidx.localbroadcastmanager', name: 'localbroadcastmanager', version: '1.0.0'

