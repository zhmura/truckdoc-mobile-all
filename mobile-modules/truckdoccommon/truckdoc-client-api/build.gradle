buildscript {
    repositories {
        mavenCentral()
    }

    dependencies {
        classpath 'org.jsonschema2pojo:jsonschema2pojo-gradle-plugin:1.0.2'
    }
}

apply plugin: 'java'
apply plugin: 'jsonschema2pojo'

sourceCompatibility = '1.8'


jsonSchema2Pojo {
    source = files("${projectDir}/src/main/jsonschema")
    annotationStyle = 'jackson2'
    targetPackage = 'com.sanda.truckdoc.client.api.v3'
    useCommonsLang3 = true
    includeJsr303Annotations = false
    useLongIntegers = true
    propertyWordDelimiters = "-_"
    serializable = true
    customAnnotator = "com.sanda.truckdoc.client.apiannotator.TruckDocCustomAnnotator"
}

dependencies {
    implementation project(":truckdoc-util")
    compile "com.fasterxml.jackson.core:jackson-annotations:2.10.3"
    implementation "org.jetbrains:annotations:19.0.0"
    implementation "org.apache.commons:commons-lang3:3.4"
}
